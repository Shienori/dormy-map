<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドーミーイン価格マップ dormy-map-20260407-1450</title>
<style>
  body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
  #controls {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: #16213e; padding: 10px 16px; display: flex; flex-wrap: wrap;
    gap: 8px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #controls label { font-size: 12px; color: #aaa; }
  #controls input[type="text"], #controls input[type="password"], #controls input[type="date"] {
    background: #0f3460; color: #eee; border: 1px solid #444; border-radius: 4px;
    padding: 4px 8px; font-size: 13px; width: 180px;
  }
  #controls input[type="date"] { width: 130px; }
  #fetchBtn {
    background: #e94560; color: #fff; border: none; border-radius: 4px;
    padding: 6px 16px; font-size: 13px; cursor: pointer; font-weight: bold;
  }
  #fetchBtn:hover { background: #c73652; }
  #fetchBtn:disabled { background: #555; cursor: not-allowed; }
  #status { font-size: 12px; color: #aaa; margin-left: 8px; }
  #map { position: fixed; top: 110px; left: 0; right: 0; bottom: 0; }
  .leaflet-popup-content { font-size: 13px; }
  .price-tag {
    background: #e94560; color: #fff; padding: 2px 6px;
    border-radius: 4px; font-size: 12px; font-weight: bold;
    white-space: nowrap; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .price-tag.no-vacancy { background: #555; }
</style>
//unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div id="controls">
  <div>
    abel>アプリID</label><br>
    <input type="text" id="appId" placeholder="UUID形式のアプリID" style="width:220px;">
  </div>
  <div>
    abel>アクセスキー</label><br>
    <input type="password" id="accessKey" placeholder="pk_..." style="width:220px;">
  </div>
  <div>
    abel>チェックイン</label><br>
    <input type="date" id="checkin">
  </div>
  <div>
    abel>チェックアウト</label><br>
    <input type="date" id="checkout">
  </div>
  <div style="align-self:flex-end;">
    <button id="fetchBtn" onclick="fetchPrices()">価格を取得</button>
  </div>
  <span id="status"></span>
</div>

<div id="map"></div>

<script>
// ドーミーインホテル一覧（hotelNo, 名称, 緯度, 経度）
const hotels = [
  { no: 104566, name: "ドーミーイン札幌",           lat: 43.0621, lng: 141.3544 },
  { no: 14019,  name: "ドーミーイン仙台",           lat: 38.2682, lng: 140.8694 },
  { no: 56534,  name: "ドーミーイン大宮",           lat: 35.9064, lng: 139.6233 },
  { no: 77940,  name: "ドーミーイン池袋",           lat: 35.7295, lng: 139.7109 },
  { no: 50775,  name: "ドーミーイン新宿",           lat: 35.6938, lng: 139.7036 },
  { no: 12695,  name: "ドーミーイン渋谷神泉",       lat: 35.6548, lng: 139.6942 },
  { no: 172226, name: "ドーミーイン新橋",           lat: 35.6658, lng: 139.7578 },
  { no: 39980,  name: "ドーミーイン秋葉原",         lat: 35.7027, lng: 139.7733 },
  { no: 69382,  name: "ドーミーイン川崎",           lat: 35.5310, lng: 139.7029 },
  { no: 76876,  name: "ドーミーイン横浜",           lat: 35.4437, lng: 139.6380 },
  { no: 51690,  name: "ドーミーイン名古屋",         lat: 35.1709, lng: 136.8815 },
  { no: 168253, name: "ドーミーイン京都四条烏丸",   lat: 35.0037, lng: 135.7590 },
  { no: 143240, name: "ドーミーイン心斎橋",         lat: 34.6724, lng: 135.5013 },
  { no: 11381,  name: "ドーミーイン梅田東",         lat: 34.7044, lng: 135.5120 },
  { no: 129607, name: "ドーミーイン博多祇園",       lat: 33.5878, lng: 130.4120 },
  { no: 104702, name: "御宿野乃 浅草",             lat: 35.7148, lng: 139.7967 },
  { no: 104703, name: "御宿野乃 道後",             lat: 33.8517, lng: 132.7875 },
  { no: 137044, name: "ドーミーイン金沢",           lat: 36.5785, lng: 136.6457 },
  { no: 176643, name: "ドーミーイン那覇",           lat: 26.2172, lng: 127.6793 },
  { no: 153267, name: "ドーミーイン広島",           lat: 34.3966, lng: 132.4596 },
  { no: 182423, name: "ドーミーイン札幌ANNEX",      lat: 43.0612, lng: 141.3512 },
  { no: 184016, name: "ドーミーイン神戸",           lat: 34.6937, lng: 135.1956 },
  { no: 183414, name: "ドーミーイン大阪北浜",       lat: 34.6891, lng: 135.5148 },
  { no: 158346, name: "ドーミーイン福岡天神",       lat: 33.5905, lng: 130.3989 },
  { no: 164657, name: "ドーミーイン奈良",           lat: 34.6819, lng: 135.8294 },
  { no: 151144, name: "ドーミーイン熊本",           lat: 32.8031, lng: 130.7079 },
];

// 地図初期化
const map = L.map('map').setView([36.5, 137.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const markers = {};

// localhost保存・復元
window.addEventListener('load', () => {
  const savedAppId = localStorage.getItem('rk_appId');
  const savedAccessKey = localStorage.getItem('rk_accessKey');
  if (savedAppId) document.getElementById('appId').value = savedAppId;
  if (savedAccessKey) document.getElementById('accessKey').value = savedAccessKey;

  // デフォルト日付（明日・明後日）
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const dayAfter = new Date(today); dayAfter.setDate(today.getDate() + 2);
  document.getElementById('checkin').value = tomorrow.toISOString().slice(0, 10);
  document.getElementById('checkout').value = dayAfter.toISOString().slice(0, 10);

  // マーカー初期配置
  hotels.forEach(h => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="price-tag no-vacancy">${h.name}</div>`,
      iconAnchor: [0, 0]
    });
    markers[h.no] = L.marker([h.lat, h.lng], { icon }).addTo(map);
    markers[h.no].bindPopup(`<b>${h.name}</b><br>価格未取得`);
  });
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchPrices() {
  const appId = document.getElementById('appId').value.trim();
  const accessKey = document.getElementById('accessKey').value.trim();
  const checkin = document.getElementById('checkin').value;
  const checkout = document.getElementById('checkout').value;
  const status = document.getElementById('status');
  const btn = document.getElementById('fetchBtn');

  if (!appId || !accessKey) { alert('アプリIDとアクセスキーを入力してください'); return; }
  if (!checkin || !checkout) { alert('日付を入力してください'); return; }

  // localStorage保存
  localStorage.setItem('rk_appId', appId);
  localStorage.setItem('rk_accessKey', accessKey);

  btn.disabled = true;
  status.textContent = '取得中...';

  let successCount = 0;
  let errorCount = 0;

  for (let i = 0; i < hotels.length; i++) {
    const h = hotels[i];
    status.textContent = `取得中... (${i + 1}/${hotels.length}) ${h.name}`;

    const params = new URLSearchParams({
      applicationId: appId,
      accessKey: accessKey,
      checkinDate: checkin,
      checkoutDate: checkout,
      adultNum: 1,
      roomNum: 1,
      hotelNo: h.no,
      datumType: 1,
      formatVersion: 2,
    });

    try {
      const res = await fetch(`/.netlify/functions/rakuten-proxy?${params.toString()}`);
      const data = await res.json();

      console.log(`hotelNo=${h.no} response:`, data);

      if (data.errors) {
        // APIエラー（Data not found等）はスキップ
        updateMarker(h, null, 'エラー: ' + (data.errors.errorMessage || '不明'));
        errorCount++;
      } else if (data.pagingInfo && data.pagingInfo.recordCount === 0) {
        updateMarker(h, null, '空室なし');
      } else if (data.hotels && data.hotels.length > 0) {
        const hotelArr = data.hotels[0];
        let price = null;

        // formatVersion=2: hotels[0][1].roomInfo[1].dailyCharge.total
        if (hotelArr[1] && hotelArr[1].roomInfo) {
          const roomInfo = hotelArr[1].roomInfo;
          if (roomInfo[1] && roomInfo[1].dailyCharge) {
            price = roomInfo[1].dailyCharge.total;
          } else if (roomInfo[0] && roomInfo[0].dailyCharge) {
            price = roomInfo[0].dailyCharge.total;
          }
        }

        // フォールバック: hotelMinCharge
        if (!price && hotelArr[0] && hotelArr[0].hotelBasicInfo) {
          price = hotelArr[0].hotelBasicInfo.hotelMinCharge;
        }

        updateMarker(h, price, price ? `¥${price.toLocaleString()}` : '価格取得失敗');
        if (price) successCount++;
      } else {
        updateMarker(h, null, '空室なし');
      }
    } catch (e) {
      console.error(`hotelNo=${h.no} error:`, e);
      updateMarker(h, null, '通信エラー');
      errorCount++;
    }

    await sleep(1000);
  }

  status.textContent = `完了 ✅ 取得成功: ${successCount}件 / スキップ: ${errorCount}件`;
  btn.disabled = false;
}

function updateMarker(hotel, price, label) {
  const hasPrice = price !== null;
  const icon = L.divIcon({
    className: '',
    html: `<div class="price-tag ${hasPrice ? '' : 'no-vacancy'}">${hasPrice ? '¥' + price.toLocaleString() : hotel.name}</div>`,
    iconAnchor: [0, 0]
  });
  markers[hotel.no].setIcon(icon);
  markers[hotel.no].bindPopup(`<b>${hotel.name}</b><br>${label}`);
}
</script>
</body>
</html>
