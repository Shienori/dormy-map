<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface2:#fbfbf9;--offset:#f3f0ec;
  --border:#d4d1ca;--divider:#dcd9d5;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-h:#0c4e54;
  --dormy:#2a7db5;--nono:#b5522a;
  --shadow:0 4px 16px oklch(0.2 0.01 80/0.12);
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--tr:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--offset:#22211f;
  --border:#393836;--divider:#262523;
  --text:#cdccca;--muted:#797876;--faint:#5a5957;
  --primary:#4f98a3;--primary-h:#227f8b;
  --dormy:#5aaedf;--nono:#df8a5a;
  --shadow:0 4px 16px oklch(0 0 0/.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,select{font:inherit;color:inherit}
#hdr{display:flex;align-items:center;gap:.75rem;padding:.5rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#logo{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:.9375rem;white-space:nowrap}
.legend-pills{display:flex;gap:.375rem;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .55rem;border-radius:9999px;font-size:.6875rem;font-weight:600;border:1.5px solid}
.pill-dormy{border-color:var(--dormy);color:var(--dormy)}
.pill-nono{border-color:var(--nono);color:var(--nono)}
.dot{width:8px;height:8px;border-radius:50%}
#theme-btn{padding:.3rem;border-radius:var(--r-md);color:var(--muted);margin-left:auto}
#theme-btn:hover{color:var(--text);background:var(--offset)}
#ctrl-bar{display:flex;align-items:center;gap:.625rem;padding:.5rem 1rem;background:var(--surface2);border-bottom:1px solid var(--divider);flex-shrink:0;flex-wrap:wrap}
#ctrl-bar label{font-size:.75rem;color:var(--muted);white-space:nowrap}
.ctrl-input{padding:.35rem .6rem;font-size:.8125rem;background:var(--offset);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text);outline:none;transition:border-color var(--tr)}
.ctrl-input:focus{border-color:var(--primary)}
.ctrl-input::placeholder{color:var(--faint)}
#apikey-input{width:210px}
#accesskey-input{width:210px}
#fetch-btn{padding:.35rem .9rem;font-size:.75rem;font-weight:700;background:var(--primary);color:#fff;border-radius:var(--r-md);white-space:nowrap;transition:background var(--tr)}
#fetch-btn:hover{background:var(--primary-h)}
#fetch-btn:disabled{opacity:.5;cursor:not-allowed}
#fetch-status{font-size:.75rem;color:var(--muted)}
#app{flex:1;display:flex;overflow:hidden;position:relative}
#map{flex:1;height:100%}
#sidebar{width:300px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sb-head{padding:.75rem .875rem .625rem;border-bottom:1px solid var(--divider);flex-shrink:0}
#sb-head h2{font-size:.875rem;font-weight:700;margin-bottom:.5rem}
#search{width:100%;padding:.4rem .6rem;background:var(--offset);border:1px solid var(--border);border-radius:var(--r-md);font-size:.8125rem;color:var(--text);outline:none;transition:border-color var(--tr)}
#search:focus{border-color:var(--primary)}
#search::placeholder{color:var(--faint)}
.filter-row{display:flex;gap:.3rem;margin-top:.4rem}
.fbtn{flex:1;padding:.25rem .4rem;font-size:.6875rem;border-radius:var(--r-sm);border:1.5px solid var(--border);color:var(--muted);background:transparent;font-weight:600;transition:border-color var(--tr),color var(--tr),background var(--tr)}
.fbtn.fa{border-color:var(--primary);background:color-mix(in oklch,var(--primary) 12%,transparent);color:var(--primary)}
.fbtn.fd{border-color:var(--dormy);background:color-mix(in oklch,var(--dormy) 12%,transparent);color:var(--dormy)}
.fbtn.fn{border-color:var(--nono);background:color-mix(in oklch,var(--nono) 12%,transparent);color:var(--nono)}
#sort-row{display:flex;align-items:center;gap:.375rem;padding:.4rem .875rem;border-bottom:1px solid var(--divider);flex-shrink:0}
#sort-row label{font-size:.6875rem;color:var(--muted);white-space:nowrap}
#sort-sel{flex:1;padding:.2rem .35rem;font-size:.6875rem;background:var(--offset);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none}
#hotel-list{flex:1;overflow-y:auto;padding:.4rem}
#hotel-list::-webkit-scrollbar{width:4px}
#hotel-list::-webkit-scrollbar-thumb{background:var(--divider);border-radius:9999px}
.hcard{padding:.625rem .75rem;border-radius:var(--r-md);border:1px solid transparent;cursor:pointer;margin-bottom:.3rem;transition:background var(--tr),border-color var(--tr)}
.hcard:hover{background:var(--offset);border-color:var(--border)}
.hcard.sel{background:var(--surface2);border-color:var(--primary)}
.hcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.4rem;margin-bottom:.2rem}
.hname{font-size:.8125rem;font-weight:700;line-height:1.3;flex:1}
.bbadge{font-size:.625rem;font-weight:700;padding:.1rem .45rem;border-radius:9999px;white-space:nowrap;flex-shrink:0}
.bd{background:color-mix(in oklch,var(--dormy) 15%,transparent);color:var(--dormy)}
.bn{background:color-mix(in oklch,var(--nono) 15%,transparent);color:var(--nono)}
.hmeta{font-size:.6875rem;color:var(--muted);display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.pchip{font-size:.6875rem;font-weight:700;padding:.1rem .45rem;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--offset)}
.pc-lo{color:#437a22;border-color:oklch(from #437a22 l c h/.45)}
.pc-mi{color:#b07d00;border-color:oklch(from #b07d00 l c h/.45)}
.pc-hi{color:#b5522a;border-color:oklch(from #b5522a l c h/.45)}
.pc-live{color:var(--primary);border-color:oklch(from var(--primary) l c h/.45)}
#count-bar{padding:.3rem .875rem;font-size:.6875rem;color:var(--muted);border-top:1px solid var(--divider);flex-shrink:0}
#price-legend{position:absolute;bottom:1.5rem;left:1rem;z-index:800;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:.55rem .8rem;box-shadow:var(--shadow);font-size:.6875rem}
#price-legend h4{font-size:.6875rem;font-weight:700;margin-bottom:.3rem;color:var(--muted)}
.lr{display:flex;align-items:center;gap:.4rem;margin-bottom:.15rem}
.lsw{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.mpinwrap{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.mbub{min-width:54px;padding:.175rem .4rem;border-radius:var(--r-md);font-weight:700;font-size:.625rem;color:#fff;text-align:center;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);border:1.5px solid rgba(255,255,255,.2)}
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:var(--r-lg)!important;box-shadow:var(--shadow)!important;color:var(--text)!important;font-family:'Noto Sans JP',sans-serif!important;padding:0!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-content{margin:0!important;min-width:230px}
.popi{padding:.875rem 1rem}
.pop-brand{font-size:.625rem;font-weight:700;margin-bottom:.2rem}
.pop-name{font-size:.9375rem;font-weight:700;margin-bottom:.3rem;line-height:1.3}
.pop-price{font-size:1.375rem;font-weight:700;margin-bottom:.2rem}
.pop-price span{font-size:.6875rem;font-weight:400;color:var(--muted)}
.pop-meta{font-size:.6875rem;color:var(--muted);margin-bottom:.15rem}
.pop-updated{font-size:.625rem;color:var(--faint);margin-bottom:.3rem}
.pop-hr{border:none;border-top:1px solid var(--divider);margin:.45rem 0}
.pop-link{display:inline-flex;align-items:center;gap:.25rem;font-size:.6875rem;font-weight:600;color:var(--primary);text-decoration:none}
.pop-link:hover{color:var(--primary-h)}
.pop-note{font-size:.5625rem;color:var(--faint);margin-top:.3rem}
#sb-toggle{display:none;position:absolute;bottom:1.5rem;right:1rem;z-index:900;background:var(--primary);color:#fff;border-radius:9999px;padding:.6rem .9rem;font-size:.875rem;font-weight:700;box-shadow:0 4px 16px oklch(from var(--primary) l c h/.4)}
@media(max-width:768px){
  #sidebar{position:absolute;right:0;top:0;bottom:0;transform:translateX(100%);transition:transform .25s ease;z-index:700;width:min(100vw,300px)}
  #sidebar.open{transform:translateX(0)}
  #sb-toggle{display:block}
  #price-legend{bottom:5rem}
  #apikey-input,#accesskey-input{width:130px}
}
</style>
